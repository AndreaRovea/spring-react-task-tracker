spring:
  application:
    name: task-tracker
  datasource:
    url: jdbc:h2:mem:tasktracker;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.andrearovea.tasktracker: DEBUG
